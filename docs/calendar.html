<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — TaskLU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f11;
      color: white;
      font-family: 'DM Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 0.5px solid #2a2a30;
      background: #16161a;
    }
    .nav-brand {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8b84b;
    }
    .nav-links {
      display: flex;
      gap: 4px;
    }
    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #666;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      border: 0.5px solid transparent;
      transition: all 0.15s;
    }
    .nav-link:hover { color: #ccc; background: #1e1e24; }
    .nav-link.active {
      color: #e8b84b;
      border-color: #e8b84b44;
      background: #e8b84b0d;
    }

    /* ── Page layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 28px 40px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: white;
    }
    .page-header p {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ── Calendar panel ── */
    .calendar-panel {
      background: #16161a;
      border: 0.5px solid #2a2a30;
      border-radius: 14px;
      padding: 28px;
      flex: 1;
    }

    @media (max-width: 600px) {
      main { padding: 16px; }
      .calendar-panel { padding: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">TaskLU</span>
    <div class="nav-links">
      <a href="./index.html" class="nav-link">Dashboard</a>
      <a href="./teamInsights.html" class="nav-link">Team Insights</a>
      <a href="./calendar.html" class="nav-link active">Calendar</a>
      <a href="./focus-mode.html" class="nav-link">Focus Mode</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>Calendar</h1>
      <p>Click any date to add or manage events.</p>
    </div>
    <div class="calendar-panel">
      <div id="feature-calendar"></div>
    </div>
  </main>

  <script type="module" src="./calendarWidget.js"></script>

</body>
</html>
