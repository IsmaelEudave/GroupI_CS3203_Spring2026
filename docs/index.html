<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group 7 Dashboard</title>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client"
      }
    }
  </script>

  <style>
    body {
      margin: 0;
      background: #0f0f11;
      color: white;
      font-family: sans-serif;
    }
    
    .dashboard-grid {
      display: grid;
      /* Task creator gets 380px, Kanban gets the rest */
      grid-template-columns: 380px 1fr; 
      gap: 20px;
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
    }
    
    .feature-container {
      background: #16161a;
      border: 1px solid #2a2a30;
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
    }

    /* Stack them on top of each other on smaller screens */
    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="dashboard-grid">
    <div id="feature-task-creator" class="feature-container"></div>

    <div id="feature-kanban" class="feature-container"></div>
  </div>

  <script type="module" src="./taskCreator.js"></script>
  <script type="module" src="./main.js"></script>

</body>
</html>
