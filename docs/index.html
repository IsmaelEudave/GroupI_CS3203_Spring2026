<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskLU - Hello World</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f2f8ff 0%, #ecfdf3 100%);
      }

      main {
        text-align: center;
        padding: 2rem;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
      }

      p {
        margin: 0;
        color: #364152;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>TaskLU GitHub Pages pipeline is live.</p>
    </main>
  </body>
</html>
