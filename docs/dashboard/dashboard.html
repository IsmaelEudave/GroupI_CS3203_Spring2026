<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Insights Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 30px;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section,
    .progress-section,
    .task-list {
      background-color: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      margin-bottom: 30px;
    }

    .section h2,
    .progress-section h2,
    .task-list h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .filter-controls {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      min-width: 220px;
    }

    .filter-group label {
      font-weight: bold;
      margin-bottom: 8px;
    }

    select,
    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      background-color: white;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background-color: #2c3e50;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.9;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .metric-card {
      background-color: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .metric-card h2 {
      font-size: 18px;
      color: #555;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      color: #2c3e50;
    }

    .progress-bar-container {
      width: 100%;
      height: 30px;
      background-color: #ddd;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 15px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #4caf50;
      text-align: center;
      line-height: 30px;
      color: white;
      font-weight: bold;
      transition: width 0.3s ease;
    }

    .task-item,
    .member-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
      gap: 15px;
    }

    .task-item:last-child,
    .member-item:last-child {
      border-bottom: none;
    }

    .task-info {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .task-title {
      font-size: 16px;
      font-weight: bold;
    }

    .task-details {
      font-size: 14px;
      color: #777;
      margin-top: 4px;
    }

    .task-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-message {
      text-align: center;
      color: #777;
      padding: 15px 0;
    }

    .delete-task-btn {
      background-color: #b23b3b;
    }

    .delete-task-btn:hover {
      opacity: 0.9;
    }

    @media (max-width: 900px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 15px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .filter-controls,
      .task-controls,
      .task-item,
      .member-item {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h1>Task Insights Dashboard</h1>

    <div class="section">
      <h2>Manage Team Members</h2>
      <div class="filter-controls">
        <div class="filter-group">
          <label for="newMemberName">Add Team Member</label>
          <input type="text" id="newMemberName" placeholder="Enter member name" />
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button onclick="addMember()">Add Member</button>
        </div>
      </div>
      <div id="memberList"></div>
    </div>

    <div class="section">
      <h2>Add Task</h2>
      <div class="filter-controls">
        <div class="filter-group">
          <label for="newTaskTitle">Task Title</label>
          <input type="text" id="newTaskTitle" placeholder="Enter task name" />
        </div>

        <div class="filter-group">
          <label for="newTaskAssignee">Assign To</label>
          <select id="newTaskAssignee">
            <option value="">Unassigned</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="newTaskStatus">Status</label>
          <select id="newTaskStatus">
            <option value="not started">Not Started</option>
            <option value="in progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="newTaskDueDate">Due Date</label>
          <input type="date" id="newTaskDueDate" />
        </div>

        <div class="filter-group">
          <label>&nbsp;</label>
          <button onclick="addTask()">Add Task</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Filters</h2>
      <div class="filter-controls">
        <div class="filter-group">
          <label for="memberFilter">Filter by Team Member</label>
          <select id="memberFilter" onchange="applyFilters()">
            <option value="all">All Members</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="statusFilter">Filter by Task Status</label>
          <select id="statusFilter" onchange="applyFilters()">
            <option value="all">All Statuses</option>
            <option value="not started">Not Started</option>
            <option value="in progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <h2>Total Tasks</h2>
        <div class="metric-value" id="totalTasks">0</div>
      </div>

      <div class="metric-card">
        <h2>Completed Tasks</h2>
        <div class="metric-value" id="completedTasks">0</div>
      </div>

      <div class="metric-card">
        <h2>Tasks In Progress</h2>
        <div class="metric-value" id="inProgressTasks">0</div>
      </div>

      <div class="metric-card">
        <h2>Tasks Not Started</h2>
        <div class="metric-value" id="notStartedTasks">0</div>
      </div>

      <div class="metric-card">
        <h2>Tasks Due This Week</h2>
        <div class="metric-value" id="dueThisWeekTasks">0</div>
      </div>

      <div class="metric-card">
        <h2>Overdue Tasks</h2>
        <div class="metric-value" id="overdueTasks">0</div>
      </div>
    </div>

    <div class="metrics-grid" id="memberMetricsGrid"></div>

    <div class="progress-section">
      <h2>Task Completion Progress</h2>
      <p>Completion Percentage: <span id="completionPercentage">0%</span></p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar">0%</div>
      </div>
    </div>

    <div class="task-list">
      <h2>Task List</h2>
      <div id="taskListContainer"></div>
    </div>
  </div>

  <script>
    let teamMembers = [];

    const tasks = [];

    function isDueThisWeek(dueDateString) {
      const today = new Date();
      const dueDate = new Date(dueDateString);

      const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const endOfWeek = new Date(startOfToday);
      endOfWeek.setDate(startOfToday.getDate() + 7);

      return dueDate >= startOfToday && dueDate <= endOfWeek;
    }

    function isOverdue(dueDateString, status) {
      const today = new Date();
      const dueDate = new Date(dueDateString);

      const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      return dueDate < startOfToday && status !== "completed";
    }

    function getFilteredTasks() {
      const memberFilter = document.getElementById("memberFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;

      return tasks.filter(task => {
        const matchesMember = memberFilter === "all" || task.assignee === memberFilter;
        const matchesStatus = statusFilter === "all" || task.status === statusFilter;
        return matchesMember && matchesStatus;
      });
    }

    function updateDashboard(filteredTasks) {
      const totalTasks = filteredTasks.length;
      const completedTasks = filteredTasks.filter(task => task.status === "completed").length;
      const inProgressTasks = filteredTasks.filter(task => task.status === "in progress").length;
      const notStartedTasks = filteredTasks.filter(task => task.status === "not started").length;
      const dueThisWeekTasks = filteredTasks.filter(task => isDueThisWeek(task.dueDate)).length;
      const overdueTasks = filteredTasks.filter(task => isOverdue(task.dueDate, task.status)).length;

      const completionPercentage = totalTasks === 0
        ? 0
        : Math.round((completedTasks / totalTasks) * 100);

      document.getElementById("totalTasks").textContent = totalTasks;
      document.getElementById("completedTasks").textContent = completedTasks;
      document.getElementById("inProgressTasks").textContent = inProgressTasks;
      document.getElementById("notStartedTasks").textContent = notStartedTasks;
      document.getElementById("dueThisWeekTasks").textContent = dueThisWeekTasks;
      document.getElementById("overdueTasks").textContent = overdueTasks;
      document.getElementById("completionPercentage").textContent = completionPercentage + "%";

      const progressBar = document.getElementById("progressBar");
      progressBar.style.width = completionPercentage + "%";
      progressBar.textContent = completionPercentage + "%";

      updateMemberCards(filteredTasks);
    }

    function updateMemberCards(filteredTasks) {
      const memberGrid = document.getElementById("memberMetricsGrid");
      memberGrid.innerHTML = "";

      const memberCounts = {};

      filteredTasks.forEach(task => {
        const memberName = task.assignee || "Unassigned";
        if (!memberCounts[memberName]) {
          memberCounts[memberName] = 0;
        }
        memberCounts[memberName]++;
      });

      if (Object.keys(memberCounts).length === 0) {
        const emptyCard = document.createElement("div");
        emptyCard.className = "metric-card";
        emptyCard.innerHTML = `
          <h2>No Member Data</h2>
          <div class="metric-value">0</div>
        `;
        memberGrid.appendChild(emptyCard);
        return;
      }

      for (const member in memberCounts) {
        const card = document.createElement("div");
        card.className = "metric-card";
        card.innerHTML = `
          <h2>${member}'s Tasks</h2>
          <div class="metric-value">${memberCounts[member]}</div>
        `;
        memberGrid.appendChild(card);
      }
    }

    function renderTaskList(filteredTasks) {
      const container = document.getElementById("taskListContainer");
      container.innerHTML = "";

      if (filteredTasks.length === 0) {
        container.innerHTML = `<div class="empty-message">No tasks match the selected filters.</div>`;
        return;
      }

      filteredTasks.forEach(task => {
        const originalIndex = tasks.indexOf(task);

        let memberOptions = `<option value="">Unassigned</option>`;
        memberOptions += teamMembers.map(member => `
          <option value="${member}" ${task.assignee === member ? "selected" : ""}>${member}</option>
        `).join("");

        const taskItem = document.createElement("div");
        taskItem.className = "task-item";

        taskItem.innerHTML = `
          <div class="task-info">
            <span class="task-title">${task.title}</span>
            <span class="task-details">Due: ${task.dueDate}</span>
          </div>

          <div class="task-controls">
            <select onchange="changeTaskAssignee(${originalIndex}, this.value)">
              ${memberOptions}
            </select>

            <select onchange="changeTaskStatus(${originalIndex}, this.value)">
              <option value="not started" ${task.status === "not started" ? "selected" : ""}>Not Started</option>
              <option value="in progress" ${task.status === "in progress" ? "selected" : ""}>In Progress</option>
              <option value="completed" ${task.status === "completed" ? "selected" : ""}>Completed</option>
            </select>

            <button class="delete-task-btn" onclick="deleteTask(${originalIndex})">Delete Task</button>
          </div>
        `;

        container.appendChild(taskItem);
      });
    }

    function changeTaskStatus(index, newStatus) {
      tasks[index].status = newStatus;
      applyFilters();
    }

    function changeTaskAssignee(index, newAssignee) {
      tasks[index].assignee = newAssignee;
      applyFilters();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      applyFilters();
    }

    function populateMemberFilter() {
      const memberFilter = document.getElementById("memberFilter");
      const currentValue = memberFilter.value || "all";

      memberFilter.innerHTML = `<option value="all">All Members</option>`;

      teamMembers.forEach(member => {
        const option = document.createElement("option");
        option.value = member;
        option.textContent = member;
        memberFilter.appendChild(option);
      });

      const validValues = ["all", ...teamMembers];
      memberFilter.value = validValues.includes(currentValue) ? currentValue : "all";
    }

    function populateTaskAssigneeDropdown() {
      const assigneeSelect = document.getElementById("newTaskAssignee");
      const currentValue = assigneeSelect.value || "";

      assigneeSelect.innerHTML = `<option value="">Unassigned</option>`;

      teamMembers.forEach(member => {
        const option = document.createElement("option");
        option.value = member;
        option.textContent = member;
        assigneeSelect.appendChild(option);
      });

      assigneeSelect.value = currentValue;
    }

    function renderMemberList() {
      const memberList = document.getElementById("memberList");
      memberList.innerHTML = "";

      if (teamMembers.length === 0) {
        memberList.innerHTML = `<div class="empty-message">No team members added yet.</div>`;
        return;
      }

      teamMembers.forEach(member => {
        const memberItem = document.createElement("div");
        memberItem.className = "member-item";
        memberItem.innerHTML = `
          <span>${member}</span>
          <button onclick="deleteMember('${member.replace(/'/g, "\\'")}')">Delete</button>
        `;
        memberList.appendChild(memberItem);
      });
    }

    function addMember() {
      const input = document.getElementById("newMemberName");
      const newName = input.value.trim();

      if (newName === "") {
        alert("Please enter a name.");
        return;
      }

      if (teamMembers.includes(newName)) {
        alert("That member already exists.");
        return;
      }

      teamMembers.push(newName);
      input.value = "";

      populateMemberFilter();
      populateTaskAssigneeDropdown();
      renderMemberList();
      applyFilters();
    }

    function deleteMember(name) {
      const memberHasTasks = tasks.some(task => task.assignee === name);

      if (memberHasTasks) {
        alert("You cannot delete this member because tasks are still assigned to them.");
        return;
      }

      teamMembers = teamMembers.filter(member => member !== name);

      const memberFilter = document.getElementById("memberFilter");
      if (memberFilter.value === name) {
        memberFilter.value = "all";
      }

      populateMemberFilter();
      populateTaskAssigneeDropdown();
      renderMemberList();
      applyFilters();
    }

    function addTask() {
      const titleInput = document.getElementById("newTaskTitle");
      const assigneeInput = document.getElementById("newTaskAssignee");
      const statusInput = document.getElementById("newTaskStatus");
      const dueDateInput = document.getElementById("newTaskDueDate");

      const title = titleInput.value.trim();
      const assignee = assigneeInput.value;
      const status = statusInput.value;
      const dueDate = dueDateInput.value;

      if (title === "") {
        alert("Please enter a task title.");
        return;
      }

      if (dueDate === "") {
        alert("Please select a due date.");
        return;
      }

      tasks.push({
        title: title,
        assignee: assignee,
        status: status,
        dueDate: dueDate
      });

      titleInput.value = "";
      assigneeInput.value = "";
      statusInput.value = "not started";
      dueDateInput.value = "";

      applyFilters();
    }

    function applyFilters() {
      const filteredTasks = getFilteredTasks();
      updateDashboard(filteredTasks);
      renderTaskList(filteredTasks);
    }

    populateMemberFilter();
    populateTaskAssigneeDropdown();
    renderMemberList();
    applyFilters();
  </script>
</body>
</html>
