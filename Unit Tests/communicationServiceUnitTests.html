<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Communication Service — Unit Tests</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a18; padding: 2rem; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 2rem; }
    .suite { margin-bottom: 2rem; }
    .suite-title { font-size: 14px; font-weight: 500; color: #555; margin-bottom: 8px; border-bottom: 0.5px solid #e0e0dc; padding-bottom: 6px; }
    .test { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 14px; }
    .test.pass { background: #eaf3de; }
    .test.fail { background: #fcebeb; }
    .icon { font-size: 13px; margin-top: 1px; flex-shrink: 0; }
    .pass .icon::before { content: "✓"; color: #3b6d11; }
    .fail .icon::before { content: "✗"; color: #a32d2d; }
    .test-name { flex: 1; color: #2c2c2a; }
    .fail .test-name { color: #a32d2d; }
    .error-msg { font-size: 12px; color: #a32d2d; margin-top: 3px; font-family: monospace; }
    .summary { background: #fff; border: 0.5px solid #e0e0dc; border-radius: 10px; padding: 1rem 1.25rem; display: flex; gap: 2rem; margin-bottom: 2rem; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 500; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .pass-num { color: #3b6d11; }
    .fail-num { color: #a32d2d; }
    .total-num { color: #185fa5; }
  </style>
</head>
<body>

<h1>Communication Service — Unit Tests</h1>
<p class="subtitle">Testing authorizeUser logic and Roles</p>

<div id="summary" class="summary"></div>
<div id="output"></div>

<script type="module">
import { communicationService, ROLES } from '../docs/communicationService.js';

/* Test framework */
const suites = [];
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
  fn();
}

function it(name, fn) {
  try {
    fn();
    currentSuite.tests.push({ name, pass: true });
  } catch (e) {
    currentSuite.tests.push({ name, pass: false, error: e.message });
  }
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected)
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toEqual(expected) {
      if (JSON.stringify(actual) !== JSON.stringify(expected))
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toBeInstanceOf(ClassObj) {
      if (!(actual instanceof ClassObj)) {
        throw new Error(`Expected instance of ${ClassObj.name}`);
      }
    }
  };
}

/* ─── Tests ─── */

describe('authorizeUser', () => {
  it('allows access for TASK_OWNER regardless of requiredLevel', () => {
    const user = { role: ROLES.TASK_OWNER };
    expect(communicationService.authorizeUser(user, 10)).toBe('ALLOW_ACCESS');
  });

  it('allows access if userRole >= requiredLevel', () => {
    const user = { role: ROLES.TASK_PARTICIPANT }; // role is 1
    // Should allow if required level is 0 or 1
    expect(communicationService.authorizeUser(user, 0)).toBe('ALLOW_ACCESS');
    expect(communicationService.authorizeUser(user, 1)).toBe('ALLOW_ACCESS');
  });

  it('denies access if userRole < requiredLevel (using ANONYMOUS)', () => {
    const anonUser = { role: ROLES.ANONYMOUS };
    const result = communicationService.authorizeUser(anonUser, 1);
    
    expect(result).toBeInstanceOf(Error);
    if (result instanceof Error) {
      expect(result.message).toBe('403: Forbidden - Insufficient Permissions');
    }
  });

  it('defaults to ANONYMOUS if no role is provided', () => {
    const user = { name: 'Guest' }; // No role
    const result = communicationService.authorizeUser(user, 1);
    expect(result).toBeInstanceOf(Error);
  });

  it('defaults to ANONYMOUS if user is null/undefined', () => {
    const result = communicationService.authorizeUser(null, 1);
    expect(result).toBeInstanceOf(Error);
  });
});

/* UI renderer */
let totalPass = 0, totalFail = 0;
const output = document.getElementById('output');

suites.forEach(suite => {
  const div = document.createElement('div');
  div.className = 'suite';
  div.innerHTML = `<div class="suite-title">${suite.name}</div>`;

  suite.tests.forEach(t => {
    totalPass += t.pass ? 1 : 0;
    totalFail += t.pass ? 0 : 1;
    const el = document.createElement('div');
    el.className = `test ${t.pass ? 'pass' : 'fail'}`;
    el.innerHTML = `
      <span class="icon"></span>
      <span class="test-name">${t.name}${t.error ? `<div class="error-msg">${t.error}</div>` : ''}</span>
    `;
    div.appendChild(el);
  });

  output.appendChild(div);
});

const total = totalPass + totalFail;
document.getElementById('summary').innerHTML = `
  <div class="stat"><div class="stat-num total-num">${total}</div><div class="stat-label">total</div></div>
  <div class="stat"><div class="stat-num pass-num">${totalPass}</div><div class="stat-label">passed</div></div>
  <div class="stat"><div class="stat-num fail-num">${totalFail}</div><div class="stat-label">failed</div></div>
`;
</script>
</body>
</html>
